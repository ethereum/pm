name: "Meeting Asset Pipeline"

on:
  workflow_dispatch:
    inputs:
      FORCE_SERIES:
        description: "Optional: Series code (e.g., 'acde', 'trustlesslogindex')"
        required: false
        type: string
      FORCE_NUMBER:
        description: "Optional: Call number (e.g., 226 for ACDE #226)"
        required: false
        type: string
      MIN_DURATION:
        description: "Minimum meeting duration in minutes (default: 10, set to 0 to process all)"
        required: false
        type: number
        default: 10

  schedule:
    - cron: "0 * * * *" # Run every hour at minute 0

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      refresh_failed: 'false'
      INPUT_FORCE_SERIES: ${{ github.event.inputs.FORCE_SERIES }}
      INPUT_FORCE_NUMBER: ${{ github.event.inputs.FORCE_NUMBER }}
      INPUT_MIN_DURATION: ${{ github.event.inputs.MIN_DURATION || '10' }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up ACDbot
        uses: ./.github/actions/setup-acdbot

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Resolve forced meeting
        if: env.INPUT_FORCE_SERIES != '' && env.INPUT_FORCE_NUMBER != ''
        run: |
          uv run --project "${GITHUB_WORKSPACE}/.github/ACDbot" --locked "${GITHUB_WORKSPACE}/.github/ACDbot/scripts/asset_pipeline/resolve_forced_target.py" \
            --series "$INPUT_FORCE_SERIES" \
            --number "$INPUT_FORCE_NUMBER" \
            --github-env "$GITHUB_ENV"

      - name: Refresh YouTube Token
        env:
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          uv run --project "${GITHUB_WORKSPACE}/.github/ACDbot" --locked "${GITHUB_WORKSPACE}/.github/ACDbot/scripts/refresh_youtube_token.py" || echo "refresh_failed=true" >> $GITHUB_ENV

      - name: Poll Zoom for recordings
        run: |
          if [ -n "$INPUT_FORCE_SERIES" ] && [ -n "$INPUT_FORCE_NUMBER" ]; then
            echo "Using resolved forced target meeting_id=$FORCED_MEETING_ID, issue_number=$FORCED_ISSUE_NUMBER for $INPUT_FORCE_SERIES #$INPUT_FORCE_NUMBER"
            if [ -n "$FORCED_MEETING_ID" ] && [ -n "$FORCED_ISSUE_NUMBER" ]; then
              uv run --project "${GITHUB_WORKSPACE}/.github/ACDbot" --locked "${GITHUB_WORKSPACE}/.github/ACDbot/scripts/poll_zoom_recordings.py" \
                --force_meeting_id "$FORCED_MEETING_ID" \
                --force_issue_number "$FORCED_ISSUE_NUMBER"
            else
              echo "Forced target was not resolved for $INPUT_FORCE_SERIES #$INPUT_FORCE_NUMBER"
              exit 1
            fi
          else
            uv run --project "${GITHUB_WORKSPACE}/.github/ACDbot" --locked "${GITHUB_WORKSPACE}/.github/ACDbot/scripts/poll_zoom_recordings.py"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Zoom credentials
          ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
          ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
          ZOOM_REFRESH_TOKEN: ${{ secrets.ZOOM_REFRESH_TOKEN }}
          # Discourse credentials
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          DISCOURSE_API_USERNAME: ${{ secrets.DISCOURSE_API_USERNAME }}
          DISCOURSE_BASE_URL: ${{ vars.DISCOURSE_BASE_URL }}
          # Telegram credentials
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}

      - name: Upload Zoom recordings to YouTube
        continue-on-error: true
        run: |
          if [ -n "$INPUT_FORCE_SERIES" ] && [ -n "$INPUT_FORCE_NUMBER" ]; then
            if [ -n "$FORCED_MEETING_ID" ] && [ -n "$FORCED_ISSUE_NUMBER" ]; then
              uv run --project "${GITHUB_WORKSPACE}/.github/ACDbot" --locked "${GITHUB_WORKSPACE}/.github/ACDbot/scripts/upload_zoom_recording.py" \
                --meeting_id "$FORCED_MEETING_ID" \
                --occurrence_issue_number "$FORCED_ISSUE_NUMBER" \
                --min-duration "$INPUT_MIN_DURATION"
            else
              echo "Forced target was not resolved for $INPUT_FORCE_SERIES #$INPUT_FORCE_NUMBER"
              exit 1
            fi
          elif [ -n "$INPUT_FORCE_SERIES" ]; then
            MEETING_ID=$(uv run --project "${GITHUB_WORKSPACE}/.github/ACDbot" --locked python -c "
          import json, os, sys
          mapping_path = os.path.join(os.environ['GITHUB_WORKSPACE'], '.github', 'ACDbot', 'meeting_topic_mapping.json')
          with open(mapping_path) as f:
              mapping = json.load(f)
          series = os.environ['INPUT_FORCE_SERIES']
          if series not in mapping:
              print(f'Series {series} not found', file=sys.stderr)
              sys.exit(1)
          print(mapping[series].get('meeting_id', ''))
          ")
            if [ -n "$MEETING_ID" ]; then
              uv run --project "${GITHUB_WORKSPACE}/.github/ACDbot" --locked "${GITHUB_WORKSPACE}/.github/ACDbot/scripts/upload_zoom_recording.py" \
                --meeting_id "$MEETING_ID" \
                --min-duration "$INPUT_MIN_DURATION"
            else
              echo "No meeting_id found for series $INPUT_FORCE_SERIES"
              uv run --project "${GITHUB_WORKSPACE}/.github/ACDbot" --locked "${GITHUB_WORKSPACE}/.github/ACDbot/scripts/upload_zoom_recording.py" \
                --min-duration "$INPUT_MIN_DURATION"
            fi
          else
            uv run --project "${GITHUB_WORKSPACE}/.github/ACDbot" --locked "${GITHUB_WORKSPACE}/.github/ACDbot/scripts/upload_zoom_recording.py" \
              --min-duration "$INPUT_MIN_DURATION"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
          ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
          ZOOM_REFRESH_TOKEN: ${{ secrets.ZOOM_REFRESH_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          DISCOURSE_API_USERNAME: ${{ secrets.DISCOURSE_API_USERNAME }}
          DISCOURSE_BASE_URL: ${{ vars.DISCOURSE_BASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          MATTERMOST_BOT_WEBHOOK_URL: ${{ secrets.MATTERMOST_BOT_WEBHOOK_URL }}
          ACD_BUMPER_URL: ${{ vars.ACD_BUMPER_URL || secrets.ACD_BUMPER_URL || 'https://github.com/ethereum/pm/releases/download/acd-video-bumper-v1/ev.mp4' }}

      - name: Compose ACDT recording test artifact
        if: env.INPUT_FORCE_SERIES == '' || env.INPUT_FORCE_SERIES == 'acdt'
        continue-on-error: true
        run: |
          mkdir -p "${RUNNER_TEMP}/acdt-compose-test"
          curl --fail --location --retry 3 --retry-delay 5 "$ACD_BUMPER_URL" --output "${RUNNER_TEMP}/acdt-compose-test/ev.mp4"
          ffprobe -v error -show_entries format=duration,size -of json "${RUNNER_TEMP}/acdt-compose-test/ev.mp4"

          args=(
            --series acdt
            --bumper "${RUNNER_TEMP}/acdt-compose-test/ev.mp4"
            --output "${RUNNER_TEMP}/acdt-compose-test/acdt-composed-recording.mp4"
            --metadata "${RUNNER_TEMP}/acdt-compose-test/metadata.json"
            --min-duration "$INPUT_MIN_DURATION"
            --max-age-days 3
          )

          if [ "$INPUT_FORCE_SERIES" = "acdt" ] && [ -n "$INPUT_FORCE_NUMBER" ]; then
            args+=(--number "$INPUT_FORCE_NUMBER")
          fi

          uv run --project "${GITHUB_WORKSPACE}/.github/ACDbot" --locked \
            "${GITHUB_WORKSPACE}/.github/ACDbot/scripts/compose_zoom_recording.py" "${args[@]}"
        env:
          ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
          ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
          ZOOM_REFRESH_TOKEN: ${{ secrets.ZOOM_REFRESH_TOKEN }}
          ACD_BUMPER_URL: ${{ vars.ACD_BUMPER_URL || secrets.ACD_BUMPER_URL || 'https://github.com/ethereum/pm/releases/download/acd-video-bumper-v1/ev.mp4' }}

      - name: Upload ACDT composed recording test artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: acdt-composed-recording-test
          path: |
            ${{ runner.temp }}/acdt-compose-test/acdt-composed-recording.mp4
            ${{ runner.temp }}/acdt-compose-test/metadata.json
          if-no-files-found: ignore
          retention-days: 3

      - name: Run asset pipeline
        if: success()
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
          ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
          ZOOM_REFRESH_TOKEN: ${{ secrets.ZOOM_REFRESH_TOKEN }}
        run: |
          cd "${GITHUB_WORKSPACE}/.github/ACDbot/scripts/asset_pipeline"

          if [ -n "$INPUT_FORCE_SERIES" ] && [ -n "$INPUT_FORCE_NUMBER" ]; then
            # Process specific meeting
            echo "Processing $INPUT_FORCE_SERIES #$INPUT_FORCE_NUMBER..."
            uv run --project "${GITHUB_WORKSPACE}/.github/ACDbot" --locked "${GITHUB_WORKSPACE}/.github/ACDbot/scripts/asset_pipeline/run_pipeline.py" -c "$INPUT_FORCE_SERIES" -n "$INPUT_FORCE_NUMBER" \
              --auto-approve --summarize --min-duration "$INPUT_MIN_DURATION"
          else
            # No forced meeting - process all recent meetings
            SERIES=$(uv run --project "${GITHUB_WORKSPACE}/.github/ACDbot" --locked python -c "import json, os; p=os.path.join(os.environ['GITHUB_WORKSPACE'], '.github', 'ACDbot', 'meeting_topic_mapping.json'); m=json.load(open(p)); print(' '.join(m.keys()))")
            for series in $SERIES; do
              uv run --project "${GITHUB_WORKSPACE}/.github/ACDbot" --locked "${GITHUB_WORKSPACE}/.github/ACDbot/scripts/asset_pipeline/run_pipeline.py" -c "$series" --recent --max-age-days 3 \
                --auto-approve --summarize --min-duration "$INPUT_MIN_DURATION" || true
            done
          fi

      - name: Generate manifest and commit all changes
        id: commit
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Generate manifest
          cd "${GITHUB_WORKSPACE}/.github/ACDbot/scripts/asset_pipeline"
          uv run --project "${GITHUB_WORKSPACE}/.github/ACDbot" --locked "${GITHUB_WORKSPACE}/.github/ACDbot/scripts/asset_pipeline/generate_manifest.py"
          cd -

          # Stage all changed files
          git add .github/ACDbot/meeting_topic_mapping.json
          git add .github/ACDbot/artifacts/

          # Check if there are any staged changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update meeting mapping, artifacts, and manifest"
            git pull --rebase
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Committed all changes"
          fi

      - name: Notify Forkcast
        if: steps.commit.outputs.has_changes == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.FORKCAST_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'ethereum',
              repo: 'forkcast',
              event_type: 'pm-assets-updated'
            });
