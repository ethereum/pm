name: Close Stale Meeting Issues

on:
  schedule:
    # Run twice per day at 06:00 and 18:00 UTC
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  close-stale-meetings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up ACDbot
        uses: ./.github/actions/setup-acdbot

      - name: Close stale meeting issues
        run: uv run --locked python .github/ACDbot/scripts/close_stale_meetings.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

permissions:
  contents: read
  issues: write
