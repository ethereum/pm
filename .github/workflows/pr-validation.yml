name: PR Validation

on:
  pull_request:
    paths:
      - '.github/ACDbot/**'
      - '.github/actions/setup-acdbot/**'
      - '.github/workflows/pr-validation.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up ACDbot
        uses: ./.github/actions/setup-acdbot
        with:
          include-dev: "true"

      - name: Run tests
        working-directory: .github/ACDbot
        run: uv run --locked pytest
