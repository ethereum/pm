name: Cancel Unmapped Calendar Meetings

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, no cancellations)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  cancel-unmapped-meetings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up ACDbot
        uses: ./.github/actions/setup-acdbot

      - name: Cancel unmapped meetings
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            uv run --locked python .github/ACDbot/scripts/cancel_unmapped_meetings.py --dry-run
          else
            uv run --locked python .github/ACDbot/scripts/cancel_unmapped_meetings.py
          fi
        env:
          GCAL_SERVICE_ACCOUNT_KEY: ${{ secrets.GCAL_SERVICE_ACCOUNT_KEY }}
          GCAL_ID: ${{ vars.GCAL_ID }}
