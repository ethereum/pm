name: Retire Call Series

# Retire a recurring call series: end its Google Calendar recurrence (keeping
# past events) and mark it inactive in the mapping. Set "active" back to true to
# resume.

on:
  workflow_dispatch:
    inputs:
      series:
        description: "Call series key to retire (e.g. glamsterdamrepricings)"
        required: true
        type: string
      dry_run:
        description: "Dry run (log only, no calendar deletion or commit)"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  retire-call-series:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up ACDbot
        uses: ./.github/actions/setup-acdbot

      - name: Retire call series
        env:
          GCAL_SERVICE_ACCOUNT_KEY: ${{ secrets.GCAL_SERVICE_ACCOUNT_KEY }}
          GCAL_ID: ${{ vars.GCAL_ID }}
          SERIES: ${{ inputs.series }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          SCRIPT="${GITHUB_WORKSPACE}/.github/ACDbot/scripts/retire_call_series.py"
          ARGS=(--series "$SERIES")
          if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); fi
          uv run --project "${GITHUB_WORKSPACE}/.github/ACDbot" --locked "$SCRIPT" "${ARGS[@]}"

      - name: Commit mapping file
        if: ${{ inputs.dry_run == false }}
        env:
          SERIES: ${{ inputs.series }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if git diff --quiet .github/ACDbot/meeting_topic_mapping.json; then
            echo "No changes to mapping file"
          else
            git add .github/ACDbot/meeting_topic_mapping.json
            git commit -m "Retire call series $SERIES"
            git pull --rebase
            git push
          fi
